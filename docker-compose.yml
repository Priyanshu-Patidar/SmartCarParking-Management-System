version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: smartparking-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartparking
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: smartparking-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:mysql://mysql:3306/smartparking?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: root
      JWT_SECRET: SmartParkingPlatformSecretKeyForJWTTokenGenerationMustBe256BitsLong!!
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: smartparking-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
