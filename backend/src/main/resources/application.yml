spring:
  application:
    name: smart-parking-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        envers:
          audit_table_suffix: _audit
        type:
          preferred_enum_jdbc_type: VARCHAR

logging:
  level:
    org.hibernate.metamodel.internal.MetadataContext: FATAL
    org.flywaydb.core.internal.database.base.Database: ERROR
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  cache:
    type: simple
  lifecycle:
    timeout-per-shutdown-phase: 30s
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  server:
    port: ${PORT:8080}
    base-path: /manage

app:
  jwt:
    # Use quotes to prevent YAML parsing errors with special characters like !!
    secret: "${JWT_SECRET:SmartParkingPlatformSecretKeyForJWTTokenGenerationMustBe256BitsLong}"
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  rate-limit:
    requests-per-minute: ${RATE_LIMIT:60}
    auth-requests-per-minute: ${AUTH_RATE_LIMIT:5}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/smartparking
    username: root
    password: Rampatidar@1672
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    clean-on-validation-error: true
    clean-disabled: false
  h2:
    console:
      enabled: false

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        type:
          preferred_enum_jdbc_type: VARCHAR
